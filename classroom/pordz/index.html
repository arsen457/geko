<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <img src="https://www.dubicars.com/images/932974/w_1300x760/linda-cars/40380900-280b-4b54-8794-2ae7df0cb068.jpg" alt="Car" class="car-img">

  <div class="card-content">
    <h2>Jaguar XE L P250</h2>

    <div class="rating">
      ⭐ <span>4.8</span>
      <small>(2,436 reviews)</small>
    </div>

    <div class="features">
      <div>👤 4 Passengers</div>
      <div>⚙️ Auto</div>
      <div>❄️ Air Conditioning</div>
      <div>🚪 4 Doors</div>
    </div>

      <hr>

    <div class="price">
      <span>Price</span>
      <h3>$1,800 <small>/day</small></h3>
    </div>

    <button class="btn">Rent Now →</button>
  </div>
</div>

</body>
</html>
